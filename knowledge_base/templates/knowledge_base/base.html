<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}StudGuide - УрФУ{% endblock %}</title>
    <!-- Подключаем Tailwind и HTMX -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    <!-- Настройка шрифтов (без засечек по ТЗ) -->
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Roboto', 'sans-serif'] },
                    colors: { urfublue: '#0053A0' } // Корпоративный синий УрФУ
                }
            }
        }
    </script>
</head>
<body class="bg-white text-gray-900 font-sans flex flex-col min-h-screen text-[16px]">
    
    <!-- Шапка (как на макете) -->
    <header class="py-4 border-b">
        <div class="max-w-6xl mx-auto px-4 flex justify-between items-center">
            <!-- Логотип -->
            <a href="{% url 'knowledge_base:home' %}" class="text-2xl font-bold">
                <span class="text-orange-500">Stud</span><span class="text-orange-400">Guide</span>
            </a>
            
            <!-- Поиск (Пока просто заглушка) -->
            <div class="hidden md:block w-1/3">
                <input type="text" placeholder="Искать статью (например: заселение, быт...)" 
                       class="w-full border border-gray-300 rounded-full px-4 py-2 text-sm focus:outline-none focus:border-orange-400">
            </div>

            <!-- Кнопка Войти -->
            <a href="{% url 'admin:index' %}" class="border-2 border-orange-400 text-orange-400 rounded-lg px-6 py-1.5 font-medium hover:bg-orange-50 transition">
                войти
            </a>
        </div>
    </header>

    <!-- Основной контент -->
    <main class="flex-grow max-w-5xl mx-auto w-full px-4 py-12 text-center">
        {% block content %}{% endblock %}
    </main>

</body>
</html>

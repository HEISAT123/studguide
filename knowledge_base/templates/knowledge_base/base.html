<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}StudGuide - УрФУ{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com?plugins=typography"></script>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Roboto', 'sans-serif'] },
                    colors: { urfublue: '#0053A0' }
                }
            }
        }
    </script>
</head>
<body class="bg-white text-gray-900 font-sans flex flex-col min-h-screen text-[16px]">
    <header class="py-4 border-b">
        <div class="max-w-6xl mx-auto px-4 flex justify-between items-center flex-wrap gap-4">
            <a href="{% url 'knowledge_base:home' %}" class="text-2xl font-bold whitespace-nowrap">
                <span class="text-orange-500">Stud</span><span class="text-orange-400">Guide</span>
            </a>
            <!-- Рабочая форма поиска -->
            <form action="{% url 'knowledge_base:search' %}" method="get" id="searchForm" class="w-full md:w-1/2 lg:w-1/3 order-3 md:order-none relative">
    
                <input type="text" name="q" id="searchInput" value="{{ request.GET.q }}" placeholder="Искать статью (например: заселение...)" 
                    class="w-full border border-gray-300 rounded-full px-4 py-2 text-sm focus:outline-none focus:border-orange-400 focus:ring-1 focus:ring-orange-400 transition-colors">
                
                <!-- Скрытая надпись с ошибкой (hidden прячет её по умолчанию) -->
                <p id="searchError" class="text-red-500 text-xs absolute left-4 -bottom-5 hidden">
                    Введите не менее 2 символов
                </p>

            </form>
            <a href="{% url 'admin:index' %}" class="border-2 border-orange-400 text-orange-400 rounded-lg px-6 py-1.5 font-medium hover:bg-orange-50 transition whitespace-nowrap">
                войти
            </a>
        </div>
    </header>
    <main class="flex-grow max-w-5xl mx-auto w-full px-4 py-12 text-center">
        {% block content %}{% endblock %}
    </main>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const searchForm = document.getElementById('searchForm');
            const searchInput = document.getElementById('searchInput');
            const searchError = document.getElementById('searchError');

            if (searchForm) {
                // Слушаем попытку отправки формы (нажатие Enter)
                searchForm.addEventListener('submit', function(e) {
                    const query = searchInput.value.trim();

                    // Если ввели ровно 1 символ
                    if (query.length > 0 && query.length < 2) {
                        e.preventDefault(); // ОТМЕНЯЕМ ПЕРЕХОД НА ДРУГУЮ СТРАНИЦУ!
                        
                        // Показываем текст ошибки и красим рамку в красный
                        searchError.classList.remove('hidden');
                        searchInput.classList.add('border-red-500', 'ring-1', 'ring-red-500');
                    }
                });

                // Убираем красную ошибку, как только человек начинает печатать дальше
                searchInput.addEventListener('input', function() {
                    searchError.classList.add('hidden');
                    searchInput.classList.remove('border-red-500', 'ring-1', 'ring-red-500');
                });
            }
        });
    </script>
</body>
</html>
